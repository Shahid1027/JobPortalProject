spring.application.name=JobPortal
# ===== CONNECTION =====
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== CONNECTION POOL =====
#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=5

server.port=8081

# Spring Security ko enable/disable
#spring.security.enabled=true

# Default username (auto-generated if not set)
spring.security.user.name=user

# Default password (auto-generated if not set)
spring.security.user.password=password

# Default user roles
spring.security.user.roles=USER

# expire in 1 hr
jwt.secret=mySecretKey1234567890
jwt.expiration=86400000  

spring.devtools.restart.additional-exclude=com/jobPortalDesc/config/** 